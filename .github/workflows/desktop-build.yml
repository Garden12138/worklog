name: Desktop build

on:
  workflow_dispatch:
  push:
    branches:
      - v2.0.0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: worklog-macos
          - os: windows-2022
            artifact: worklog-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ runner.os == 'macOS' && 'aarch64-apple-darwin,x86_64-apple-darwin' || 'x86_64-pc-windows-msvc' }}
          components: rustfmt, clippy

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Test Rust core
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Check frontend
        run: npm run build
        working-directory: frontend

      - name: Build macOS universal DMG
        if: runner.os == 'macOS'
        env:
          SIGNING_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          NOTARIZATION_APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "$SIGNING_CERTIFICATE" && -n "$SIGNING_CERTIFICATE_PASSWORD" && -n "$SIGNING_IDENTITY" ]]; then
            export APPLE_CERTIFICATE="$SIGNING_CERTIFICATE"
            export APPLE_CERTIFICATE_PASSWORD="$SIGNING_CERTIFICATE_PASSWORD"
            export APPLE_SIGNING_IDENTITY="$SIGNING_IDENTITY"
          else
            export APPLE_SIGNING_IDENTITY="-"
          fi

          if [[ -n "$NOTARIZATION_APPLE_ID" && -n "$NOTARIZATION_PASSWORD" && -n "$NOTARIZATION_TEAM_ID" ]]; then
            export APPLE_ID="$NOTARIZATION_APPLE_ID"
            export APPLE_PASSWORD="$NOTARIZATION_PASSWORD"
            export APPLE_TEAM_ID="$NOTARIZATION_TEAM_ID"
          fi

          node frontend/node_modules/@tauri-apps/cli/tauri.js build --target universal-apple-darwin --bundles dmg

      - name: Build Windows x64 NSIS installer
        if: runner.os == 'Windows'
        run: node frontend/node_modules/@tauri-apps/cli/tauri.js build --target x86_64-pc-windows-msvc --bundles nsis

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
